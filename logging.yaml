  version: 1
  disable_existing_loggers: true
  formatters:
    standard_formatter:
      format: "%(asctime)s %(levelname)7s %(name)s: %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"
  handlers:
    console:
      formatter: standard_formatter
      class: logging.StreamHandler
      stream: ext://sys.stdout
      level: DEBUG
    files:
      formatter: standard_formatter
      class: logging.handlers.RotatingFileHandler
      filename: dbkgexp.log
      mode: w
      level: DEBUG
  loggers:
    dbkgexp:
      handlers:
        - console
        - files
      level: INFO
      propagate: false
    __main__:
      handlers:
        - console
        - files
      level: INFO
      propagate: false
    openai:
      level: ERROR
      handlers:
        - console
    httpx:
      level: ERROR
    root:
      level: ERROR
      propagate: false
